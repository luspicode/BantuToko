<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Links</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 30px 20px;
      border-radius: 20px;
      text-align: center;
      width: 320px;
      color: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .profile-img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid white;
      object-fit: cover;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 5px;
    }

    p {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .link {
      display: block;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.2);
      transition: 0.3s;
      font-weight: bold;
    }

    .link:hover {
      background: white;
      color: #333;
      transform: scale(1.05);
    }

    footer {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="https://i.pravatar.cc/150" class="profile-img" alt="profile">
    <h1>Nama Kamu</h1>
    <p>Mahasiswa • Programmer</p>

    <a href="#" class="link">Instagram</a>
    <a href="#" class="link">TikTok</a>
    <a href="#" class="link">YouTube</a>
    <a href="#" class="link">GitHub</a>

    <footer>© 2026</footer>
  </div>

</body>
</html>
