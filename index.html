<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bimacell</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      background: linear-gradient(270deg, #667eea, #764ba2, #6a11cb, #2575fc);
      background-size: 600% 600%;
      animation: gradientMove 10s ease infinite;
      transition: 0.5s;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body.dark {
      background: #121212;
      animation: none;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      padding: 30px 20px;
      border-radius: 20px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .profile-img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid white;
      object-fit: cover;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 5px;
    }

    p {
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 20px;
    }

    .link {
      display: block;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.2);
      transition: 0.3s;
      font-weight: bold;
    }

    .link:hover {
      background: white;
      color: #333;
      transform: scale(1.05);
    }

    .toggle-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 8px 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: rgba(255,255,255,0.2);
      color: white;
    }

    footer {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <button class="toggle-btn" onclick="toggleMode()">🌙/☀️</button>

  <div class="card">
    <img src="https://github.com/luspicode/BantuToko/blob/main/foto.jpg" class="profile-img">    
    <h1>Bimacell Tools</h1>

    <a href="https://drive.google.com/drive/folders/1K4VgMQJ6Cha9NfzUhwwTgcPCA1DR-iNL?usp=sharing" class="link">Aplikasi PC</a>
    <a href="#" class="link">Unlocktool</a>
    <a href="#" class="link">Download Lagu YouTube</a>

    <footer>By Luthfi - © 2026</footer>
  </div>

  <script>
    function toggleMode() {
      document.body.classList.toggle('dark');
    }
  </script>

</body>
</html>
